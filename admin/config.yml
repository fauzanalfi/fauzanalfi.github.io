local_backend: true

backend:
  name: github
  repo: fauzanalfi/fauzanalfi.github.io
  branch: main
  # GitHub Pages requires an OAuth proxy for Decap login.
  # Example: https://decap-oauth-fauzan.onrender.com
  base_url: https://netlify-cms-github-oauth-provider-9c65.onrender.com
  auth_endpoint: auth

publish_mode: editorial_workflow
media_folder: assets/uploads
public_folder: /assets/uploads

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: _posts
    create: true
    extension: markdown
    format: yaml-frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}"
    editor:
      preview: true
    fields:
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Publish Date, name: date, widget: datetime }
      - label: Categories
        name: categories
        widget: list
        required: false
        hint: Add one category per item.
      - { label: Body, name: body, widget: markdown }
