  - name: posts
    label: Posts
    label_singular: Post
    folder: _posts
    create: true
    extension: markdown
    format: yaml-frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/posts/{{slug}}/"
    editor:
      preview: true
    fields:
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: SEO Title, name: seo_title, widget: string, required: false }
      - { label: SEO Description, name: seo_description, widget: text, required: false }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Published, name: published, widget: boolean, required: false, default: true }
      - { label: Featured on Home, name: featured, widget: boolean, required: false, default: false }
      - { label: Manual Sort Order, name: sort_order, widget: number, required: false, default: 999, value_type: int, min: 1 }
      - label: Categories
        name: categories
        widget: list
        required: false
        hint: Add one category per item.
      - label: Tags
        name: tags
        widget: list
        required: false
        hint: Add one tag per item.
      - label: Header
        name: header
        widget: object
        required: false
        fields:
          - { label: Featured Image, name: teaser, widget: image, required: false }
      - { label: Canonical URL, name: canonical_url, widget: string, required: false }
      - { label: Enable Table of Contents, name: toc, widget: boolean, required: false, default: false }
      - { label: Comments Enabled, name: comments, widget: boolean, required: false, default: true }
      - { label: Body, name: body, widget: markdown }

