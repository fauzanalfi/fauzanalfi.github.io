local_backend: true

backend:
  name: github
  repo: fauzanalfi/fauzanalfi.github.io
  branch: main
  # GitHub Pages requires an OAuth proxy for Decap login.
  # Example: https://decap-oauth-fauzan.onrender.com
  base_url: https://netlify-cms-github-oauth-provider-9c65.onrender.com
  auth_endpoint: auth

publish_mode: editorial_workflow
media_folder: assets/uploads
public_folder: /assets/uploads

collections:
  - name: site_settings
    label: Site Settings
    files:
      - name: blog_settings
        label: Blog & SEO Settings
        file: _config.yml
        fields:
          - { label: Locale, name: locale, widget: string, required: true }
          - { label: Blog Title, name: title, widget: string, hint: "Judul utama blog yang tampil di situs." }
          - { label: Site Name, name: name, widget: string, required: true }
          - { label: Site Description, name: description, widget: text, required: false }
          - { label: Site URL, name: url, widget: string, required: true, hint: "Contoh: https://fauzanalfi.github.io" }
          - { label: Base URL, name: baseurl, widget: string, required: false, hint: "Kosongkan untuk root domain" }
          - { label: Repository, name: repository, widget: string, required: false }
          - { label: Timezone, name: timezone, widget: string, required: false }
          - { label: Future Posts Enabled, name: future, widget: boolean, required: false, default: false }
          - { label: Remote Theme, name: remote_theme, widget: string, required: true }
          - { label: Site Theme Variant, name: site_theme, widget: string, required: false }

          - label: Author
            name: author
            widget: object
            fields:
              - { label: Avatar, name: avatar, widget: image, required: false }
              - { label: Name, name: name, widget: string, required: false }
              - { label: Bio, name: bio, widget: text, required: false }
              - { label: Location, name: location, widget: string, required: false }
              - { label: Email, name: email, widget: string, required: false }
              - { label: GitHub, name: github, widget: string, required: false }
              - { label: LinkedIn, name: linkedin, widget: string, required: false }
              - { label: Instagram, name: instagram, widget: string, required: false }
              - { label: Twitter, name: twitter, widget: string, required: false }

          - label: Comments
            name: comments
            widget: object
            fields:
              - { label: Provider, name: provider, widget: string, required: false }
              - label: Disqus
                name: disqus
                widget: object
                fields:
                  - { label: Shortname, name: shortname, widget: string, required: false }

          - { label: Breadcrumbs, name: breadcrumbs, widget: boolean, required: false, default: false }
          - { label: Read More, name: read_more, widget: string, required: false }
          - { label: Post Permalink, name: permalink, widget: string, required: true }

          - label: Plugins
            name: plugins
            widget: list
            required: true
            field: { label: Plugin, name: plugin, widget: string }

          - label: Defaults
            name: defaults
            widget: list
            required: false
            summary: "{{fields.scope.type}}"
            fields:
              - label: Scope
                name: scope
                widget: object
                fields:
                  - { label: Path, name: path, widget: string, required: false }
                  - { label: Type, name: type, widget: string, required: false }
              - label: Values
                name: values
                widget: object
                fields:
                  - { label: Layout, name: layout, widget: string, required: false }
                  - { label: Author Profile, name: author_profile, widget: boolean, required: false }
                  - { label: Read Time, name: read_time, widget: boolean, required: false }
                  - { label: Comments, name: comments, widget: boolean, required: false }
                  - { label: Share, name: share, widget: boolean, required: false }
                  - { label: Related, name: related, widget: boolean, required: false }

          - label: Exclude Files
            name: exclude
            widget: list
            required: false
            field: { label: Path, name: path, widget: string }

          - label: Include Files
            name: include
            widget: list
            required: false
            field: { label: Path, name: path, widget: string }

      - name: navigation
        label: Navigation
        file: _data/navigation.yml
        fields:
          - label: Main Menu
            name: main
            widget: list
            summary: "{{fields.title}} → {{fields.url}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: URL, name: url, widget: string, hint: "Contoh: /, /blog/, /about/" }

  - name: posts
    label: Posts
    label_singular: Post
    folder: _posts
    create: true
    extension: markdown
    format: yaml-frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/posts/{{slug}}/"
    editor:
      preview: true
    fields:
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: SEO Title, name: seo_title, widget: string, required: false }
      - { label: SEO Description, name: seo_description, widget: text, required: false }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Published, name: published, widget: boolean, required: false, default: true }
      - label: Categories
        name: categories
        widget: list
        required: false
        hint: Add one category per item.
      - label: Tags
        name: tags
        widget: list
        required: false
        hint: Add one tag per item.
      - label: Header
        name: header
        widget: object
        required: false
        fields:
          - { label: Featured Image, name: teaser, widget: image, required: false }
      - { label: Canonical URL, name: canonical_url, widget: string, required: false }
      - { label: Enable Table of Contents, name: toc, widget: boolean, required: false, default: false }
      - { label: Comments Enabled, name: comments, widget: boolean, required: false, default: true }
      - { label: Body, name: body, widget: markdown }

  - name: drafts
    label: Drafts
    label_singular: Draft
    folder: _drafts
    create: true
    extension: markdown
    format: yaml-frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: true
    fields:
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Draft Date, name: date, widget: datetime }
      - label: Categories
        name: categories
        widget: list
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
      - { label: Body, name: body, widget: markdown }

  - name: pages
    label: Pages
    label_singular: Page
    folder: _pages
    create: true
    extension: md
    format: yaml-frontmatter
    slug: "{{slug}}"
    preview_path: "/{{slug}}/"
    editor:
      preview: true
    fields:
      - { label: Layout, name: layout, widget: hidden, default: single }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Permalink, name: permalink, widget: string, hint: "Contoh: /about/" }
      - { label: Author Profile, name: author_profile, widget: boolean, required: false, default: true }
      - { label: Published, name: published, widget: boolean, required: false, default: true }
      - { label: SEO Title, name: seo_title, widget: string, required: false }
      - { label: SEO Description, name: seo_description, widget: text, required: false }
      - { label: Body, name: body, widget: markdown }
