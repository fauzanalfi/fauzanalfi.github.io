<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">F18N Lab visual</title>
  <desc id="desc">Abstract composition suggesting layered BIM and XR research surfaces.</desc>
