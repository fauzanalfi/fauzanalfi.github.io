---
layout: default
---

<div class="page-wrap">
  <section class="page-hero">
    {% if page.eyebrow %}<span class="eyebrow">{{ page.eyebrow }}</span>{% endif %}
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}<p class="page-summary">{{ page.description }}</p>{% endif %}
  </section>

  <section class="section-block">
    <div data-taxonomy-results data-taxonomy-type="{{ page.taxonomy_type }}" data-index-url="{{ '/search.json' | relative_url }}"></div>
  </section>

  {% include footer.html %}
</div>
